# Here you can define all your datasets by using simple YAML syntax.
#
# Documentation for this file format can be found in "The Data Catalog"
# Link: https://docs.kedro.org/en/stable/catalog-data/introduction/#data-catalog

train_data:
  type: pandas.ParquetDataset
  filepath: data/01_raw/bike_data_train.parquet

inference_data:
  type: pandas.ParquetDataset
  filepath: data/01_raw/bike_data_inference.parquet

inference_batch:
  type: pandas.ParquetDataset
  filepath: data/03_primary/inference_batch.parquet

features:
  type: pandas.ParquetDataset
  filepath: data/04_features/features.parquet

predictions_with_timestamps:
  type: pandas.ParquetDataset
  filepath: data/07_model_output/predictions.parquet